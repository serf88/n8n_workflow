<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Cruise Como — Chat Widget Demo</title>
    <style>
        /* ═══════════════════════════════════════
           Hotel Cruise Como — Chat Widget CSS
           Embed via: <script src="chat-widget.js"></script>
           ═══════════════════════════════════════ */

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #e8f4f8, #f0f7ff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Widget Launcher Button ── */
        #hcc-chat-launcher {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1a3a5c, #2980b9);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(26, 58, 92, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 9998;
        }

        #hcc-chat-launcher:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(26, 58, 92, 0.5);
        }

        #hcc-chat-launcher svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        /* ── Chat Window ── */
        #hcc-chat-window {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 380px;
            max-height: 580px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
            animation: slideUp 0.3s ease;
        }

        #hcc-chat-window.open { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        #hcc-chat-header {
            background: linear-gradient(135deg, #1a3a5c, #2980b9);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #hcc-chat-avatar {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        #hcc-chat-header-info { flex: 1; }
        #hcc-chat-header-info h3 { color: white; font-size: 15px; font-weight: 600; }
        #hcc-chat-header-info p  { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 2px; }

        #hcc-online-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 4px;
        }

        #hcc-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.8);
            font-size: 20px;
            padding: 4px;
        }

        #hcc-close-btn:hover { color: white; }

        /* ── Messages ── */
        #hcc-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
            max-height: 400px;
            background: #f8fafc;
        }

        .hcc-msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hcc-msg-bot {
            align-self: flex-start;
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .hcc-msg-user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a3a5c, #2980b9);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .hcc-msg-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .hcc-msg-bot .hcc-msg-time { text-align: left; }

        /* ── Typing Indicator ── */
        .hcc-typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .hcc-typing span {
            width: 8px; height: 8px;
            background: #1a3a5c;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .hcc-typing span:nth-child(2) { animation-delay: 0.2s; }
        .hcc-typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ── Quick Replies ── */
        #hcc-quick-replies {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: white;
            border-top: 1px solid #f0f0f0;
        }

        .hcc-quick-btn {
            background: #f0f7ff;
            border: 1px solid #b3d4f5;
            color: #1a3a5c;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .hcc-quick-btn:hover {
            background: #1a3a5c;
            color: white;
        }

        /* ── Input ── */
        #hcc-input-area {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        #hcc-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #hcc-input:focus { border-color: #2980b9; }

        #hcc-send-btn {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #1a3a5c, #2980b9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        #hcc-send-btn:hover { transform: scale(1.1); }
        #hcc-send-btn svg { fill: white; width: 18px; height: 18px; }

        /* ── Powered By ── */
        #hcc-footer {
            text-align: center;
            padding: 6px;
            font-size: 10px;
            color: #bbb;
            background: white;
        }

        #hcc-footer a { color: #bbb; text-decoration: none; }

        /* ── Demo page styles ── */
        .demo-container {
            text-align: center;
            color: #1a3a5c;
        }

        .demo-container h1 { font-size: 2rem; margin-bottom: 1rem; }
        .demo-container p  { font-size: 1.1rem; color: #666; }

        @media (max-width: 480px) {
            #hcc-chat-window {
                bottom: 0; right: 0;
                width: 100vw;
                border-radius: 16px 16px 0 0;
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>

<div class="demo-container">
    <h1>🏨 Hotel Cruise Como</h1>
    <p>Chat widget demo — clicca il pulsante in basso a destra</p>
</div>

<!-- ═══════════════════════════════════════
     CHAT WIDGET — STRUTTURA HTML
     Da incollare su qualsiasi pagina web
     ═══════════════════════════════════════ -->

<!-- Launcher Button -->
<button id="hcc-chat-launcher" aria-label="Apri chat Hotel Cruise Como">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
</button>

<!-- Chat Window -->
<div id="hcc-chat-window">

    <!-- Header -->
    <div id="hcc-chat-header">
        <div id="hcc-chat-avatar">🏨</div>
        <div id="hcc-chat-header-info">
            <h3>Hotel Cruise Como</h3>
            <p><span id="hcc-online-dot"></span>Assistente AI — Sempre disponibile</p>
        </div>
        <button id="hcc-close-btn" onclick="hccToggleChat()">✕</button>
    </div>

    <!-- Messages -->
    <div id="hcc-messages"></div>

    <!-- Quick Replies -->
    <div id="hcc-quick-replies">
        <button class="hcc-quick-btn" onclick="hccSendQuick('Check-in e Check-out')">🛎 Check-in</button>
        <button class="hcc-quick-btn" onclick="hccSendQuick('WiFi password')">📶 WiFi</button>
        <button class="hcc-quick-btn" onclick="hccSendQuick('Ristorante orari')">🍽 Ristorante</button>
        <button class="hcc-quick-btn" onclick="hccSendQuick('Attività sul Lago di Como')">🌊 Lago</button>
        <button class="hcc-quick-btn" onclick="hccSendQuick('Parcheggio')">🚗 Parcheggio</button>
    </div>

    <!-- Input -->
    <div id="hcc-input-area">
        <input
            type="text"
            id="hcc-input"
            placeholder="Scrivi un messaggio..."
            onkeypress="if(event.key==='Enter') hccSendMessage()"
        />
        <button id="hcc-send-btn" onclick="hccSendMessage()" aria-label="Invia">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <!-- Footer -->
    <div id="hcc-footer">Powered by <a href="https://agentico.it" target="_blank">Agentico AI</a></div>

</div>

<!-- Widget Logic -->
<script src="chat-widget.js"></script>

</body>
</html>
